services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ticketanalyzer:latest
    container_name: ticketanalyzer-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Loaded into the container's env at runtime; pass via .env, host env,
      # or replace with a Docker secret / vault reference in production.
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:?Set GOOGLE_API_KEY in a .env file or your shell}
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
